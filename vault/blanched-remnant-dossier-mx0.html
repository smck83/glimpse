<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Glimpse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@700;800&display=swap');

    :root {
      --bg:      #0a0a0c;
      --surface: #111116;
      --border:  #1e1e28;
      --accent:  #00e5ff;
      --text:    #c8ccd8;
      --dim:     #555570;
      --danger:  #ff4455;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px 36px;
      animation: rise 0.4s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-word {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .logo-word span { color: var(--accent); }

    .logo-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
      letter-spacing: 2px;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.15s;
    }

    button:hover { filter: brightness(1.1); }

    #staticrypt-message {
      margin-top: 14px;
      font-size: 11px;
      color: var(--danger);
      text-align: center;
      min-height: 18px;
      display: none;
    }

    #staticrypt-message.visible { display: block; }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 11px;
      color: var(--dim);
      cursor: pointer;
    }

    .remember-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px;
      height: 13px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-word">Gl<span>i</span>mpse</div>
    <div class="logo-sub">Private &middot; Encrypted &middot; Shared</div>
  </div>
  <div class="divider"></div>

  <label for="staticrypt-password">Enter password to unlock</label>
  <input
    id="staticrypt-password"
    type="password"
    placeholder="············"
    autofocus
  />

  <button id="staticrypt-decrypt-button">Unlock</button>

  <div id="staticrypt-message"></div>

  <!--remember_me-->
  <label class="remember-label" id="remember-label" style="display:none">
    <input type="checkbox" id="staticrypt-remember-me"/>
    Remember me on this device
  </label>
  <!--/remember_me-->

  <div class="footer">glimpse &middot; encrypted with AES-256</div>
</div>

<!--staticrypt_embed-->

</body>
</html>
